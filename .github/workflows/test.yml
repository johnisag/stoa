name: test

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the default GITHUB_TOKEN is read-only for every job here. Raise
# per-job only if a step ever needs to write (none does today).
permissions:
  contents: read

jobs:
  # Tripwire: fail if any auto-execution surface (lifecycle scripts, Claude/MCP
  # hooks, editor tasks, dropped payloads) appears. Cheap, runs first.
  guard:
    name: surface-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      # Run the guard CODE from a TRUSTED ref (the base branch), not the PR head, so
      # a PR cannot weaken the guard LOGIC and pass its own check. (The pins/config
      # are still read from the PR head — re-pinning a trojan is blocked by the
      # CODEOWNERS review gate on security/, not by this job; keep that gate on.)
      # Bootstrap-falls-back to the checked-out copy only when the guard doesn't
      # exist on the base yet.
      - name: Supply-chain surface guard
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref || 'main' }}" 2>/dev/null || true
          if git cat-file -e FETCH_HEAD:scripts/guard-surfaces.mjs 2>/dev/null; then
            git show FETCH_HEAD:scripts/guard-surfaces.mjs > "${RUNNER_TEMP}/trusted-guard.mjs"
            node "${RUNNER_TEMP}/trusted-guard.mjs"
          else
            node scripts/guard-surfaces.mjs
          fi

  # Secret scanning: catch committed credentials / tokens (the incident's goal).
  # Free for public + personal-account repos; orgs need a GITLEAKS_LICENSE.
  secrets:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We grant only contents:read (least privilege). gitleaks would 403 trying
          # to post PR review comments — disable them; the job still fails on a leak.
          GITLEAKS_ENABLE_COMMENTS: "false"

  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm test

      - name: Production build
        run: npm run build
