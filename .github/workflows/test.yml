name: test

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the default GITHUB_TOKEN is read-only for every job here. Raise
# per-job only if a step ever needs to write (none does today).
permissions:
  contents: read

jobs:
  # Tripwire: fail if any auto-execution surface (lifecycle scripts, Claude/MCP
  # hooks, editor tasks, dropped payloads) appears. Cheap, runs first.
  guard:
    name: surface-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 24
      # Run the guard CODE from a TRUSTED ref (the base branch), not the PR head, so
      # a PR cannot weaken the guard LOGIC and pass its own check. (The pins/config
      # are still read from the PR head — re-pinning a trojan is blocked by the
      # CODEOWNERS review gate on security/, not by this job; keep that gate on.)
      # Bootstrap-falls-back to the checked-out copy only when the guard doesn't
      # exist on the base yet.
      - name: Supply-chain surface guard
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref || 'main' }}" 2>/dev/null || true
          if git cat-file -e FETCH_HEAD:scripts/guard-surfaces.mjs 2>/dev/null; then
            git show FETCH_HEAD:scripts/guard-surfaces.mjs > "${RUNNER_TEMP}/trusted-guard.mjs"
            node "${RUNNER_TEMP}/trusted-guard.mjs"
          else
            node scripts/guard-surfaces.mjs
          fi

  # Formatting drift tripwire: the pre-commit hook only formats STAGED files,
  # so a prettier version bump silently leaves already-committed files failing
  # --check until each is next touched (the 3.7.4→3.9.2 bump left 66). Uses the
  # LOCAL prettier from node_modules (npx) so the checked version is exactly
  # the lockfile's, and shares the test job's node_modules cache key.
  format:
    name: prettier-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        id: setup-node
        with:
          node-version: 24
          cache: npm
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ runner.os }}-node${{ steps.setup-node.outputs.node-version }}-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps
      - name: Prettier check
        run: npx prettier --check .

  # Secret scanning: catch committed credentials / tokens (the incident's goal).
  # Free for public + personal-account repos; orgs need a GITLEAKS_LICENSE.
  secrets:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We grant only contents:read (least privilege). gitleaks would 403 trying
          # to post PR review comments — disable them; the job still fails on a leak.
          GITLEAKS_ENABLE_COMMENTS: "false"

  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        id: setup-node
        with:
          node-version: 24
          cache: npm

      # Cache the installed node_modules (including the built better-sqlite3 /
      # node-pty native binaries) keyed by the lockfile + resolved Node version, so
      # the flaky Windows native BUILD is skipped whenever the cache hits (the common
      # case: a PR that doesn't touch dependencies). Lockfile changes — e.g. a
      # dependabot bump — miss the cache and still build; the retry below is the
      # backstop for that case. The Node version is in the key because the cached
      # native binaries are ABI-bound to it (a future node-version bump must not
      # restore a stale, mismatched node_modules).
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ runner.os }}-node${{ steps.setup-node.outputs.node-version }}-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        # Skipped entirely on a cache hit (node_modules restored). Only runs on a
        # dependency change / cold cache, where the native build happens — so wrap it
        # in a retry: better-sqlite3's prebuilt-binary download flakes on the Windows
        # runner, forcing a source build whose node-gyp can't find VS
        # (ERR_CHILD_PROCESS_STDIO_MAXBUFFER). Retry a few times before failing.
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          for attempt in 1 2 3 4; do
            echo "npm install attempt $attempt/4"
            if npm install --legacy-peer-deps; then exit 0; fi
            echo "::warning::npm install failed (attempt $attempt/4) — clearing node_modules and retrying"
            rm -rf node_modules || true
            sleep 10
          done
          echo "::error::npm install failed after 4 attempts"
          exit 1

      - name: Type check
        run: npm run typecheck

      # The fast, reliable suite (everything except the real-pty integration
      # tests) runs once — a genuine failure here fails the job immediately.
      - name: Unit + integration tests
        run: npx vitest run --project unit

      # The real-pty integration tests are serialized into their own project (see
      # vitest.config.ts) so they never run concurrent ConPTY. A residual native
      # crash is still possible — node-pty/ConPTY occasionally segfaults the worker
      # on the Windows runner ("worker exited unexpectedly", no JS stack). It's
      # flaky infra, not a real test failure, so retry the project (the tests must
      # still PASS within the attempts — a genuinely broken pty test fails all 3).
      - name: PTY integration tests
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "pty tests attempt $attempt/3"
            if npx vitest run --project pty; then exit 0; fi
            echo "::warning::pty tests crashed (attempt $attempt/3) — retrying"
            sleep 5
          done
          echo "::error::pty tests failed after 3 attempts"
          exit 1

      - name: Production build
        run: npm run build
