name: update-visual-baselines

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update baselines on (defaults to main)"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  update:
    name: Regenerate visual baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm start &
        env:
          NODE_ENV: production

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3011/ > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          curl -sf http://localhost:3011/ > /dev/null 2>&1 || { echo "App never started — aborting."; exit 1; }

      - name: Generate / update baselines
        run: npm run test:visual:update
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3011
        # Always continue — update-snapshots exits 1 on first write but we want to commit
        continue-on-error: true

      - name: Upload generated baselines for preview
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-baselines-preview
          path: test/visual/baselines/
          retention-days: 14

      - name: Commit updated baselines
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add test/visual/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore: update visual regression baselines [skip ci]"
            git push
          fi
