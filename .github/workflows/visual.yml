name: visual

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: read-only contents.
permissions:
  contents: read

jobs:
  visual:
    name: visual-regression
    # Ubuntu only — screenshots are pixel-for-pixel stable here.
    # macOS/Windows font rendering differs; separate baselines aren't worth it.
    runs-on: ubuntu-latest
    # Non-blocking: this job runs in parallel with the main test matrix but its
    # failure uploads artifacts instead of blocking the merge. Change
    # `continue-on-error` to `false` once baselines are established and the job
    # is trusted to be stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm start &
        env:
          NODE_ENV: production

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3011/ > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done

      - name: Run visual tests
        run: npm run test:visual
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3011

      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-visual-diffs
          path: |
            playwright-report/
            test-results/
          retention-days: 14
