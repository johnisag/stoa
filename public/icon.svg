<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Keep app/icon.svg and public/icon.svg byte-identical: app/ backs the App
       Router <link rel=icon>; public/ is the static /icon.svg fetched by the
       favicon.ico redirect (next.config.ts) and the push icon (app/sw.ts). -->
  <rect width="32" height="32" rx="6" fill="#15151a"/>
  <!-- Agent bot trio: Claude (amber) · Codex (emerald) · Hermes (violet) -->
  <g fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- violet (back, right) -->
    <g transform="translate(13.8 8.8) scale(0.6)" stroke="#8b5cf6">
      <path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
    </g>
    <!-- emerald (middle) -->
    <rect x="9" y="10.2" width="14" height="11.6" rx="2.5" fill="#15151a" stroke="none"/>
    <g transform="translate(8.8 8.8) scale(0.6)" stroke="#10b981">
      <path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
    </g>
    <!-- amber (front, left) -->
    <rect x="4" y="10.2" width="14" height="11.6" rx="2.5" fill="#15151a" stroke="none"/>
    <g transform="translate(3.8 8.8) scale(0.6)" stroke="#f59e0b">
      <path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>
    </g>
  </g>
</svg>
